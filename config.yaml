# 15x15 water maze: player top-left, tree top-right, water walls between.
experiment:
  name: maze_15x15_cows
  output_dir: runs
  num_trials: 5
  max_turns: 100
  seed: 0
  same_world_each_trial: true
  record_video: true
  video_fps: 6

objective:
  type: achievement
  target: collect_wood
  item: wood
  amount: 1

world:
  size: [15, 15]
  base_terrain: grass
  player_start: [0, 0] # top-left corner
  static: true
  freeze_daylight: true
  inventory: {}
  features:
    trees:
      positions: [[14, 0]] # top-right corner
    water:
      positions:
        [
          [3, 0],
          [9, 0],
          [3, 1],
          [9, 1],
          [3, 2],
          [9, 2],
          [3, 3],
          [6, 3],
          [9, 3],
          [12, 3],
          [3, 4],
          [6, 4],
          [9, 4],
          [12, 4],
          [3, 5],
          [6, 5],
          [9, 5],
          [12, 5],
          [3, 6],
          [6, 6],
          [9, 6],
          [12, 6],
          [3, 7],
          [6, 7],
          [9, 7],
          [12, 7],
          [3, 8],
          [6, 8],
          [9, 8],
          [12, 8],
          [3, 9],
          [6, 9],
          [9, 9],
          [12, 9],
          [3, 10],
          [6, 10],
          [9, 10],
          [12, 10],
          [3, 11],
          [6, 11],
          [9, 11],
          [12, 11],
          [6, 12],
          [12, 12],
          [6, 13],
          [12, 13],
          [6, 14],
          [12, 14],
        ]
  entities:
    cow:
      positions: [[13, 1], [2, 13]]

prompt:
  include_legend: true
  include_inventory: true
  include_achievements: true
  include_action_list: true

  system: |
    You are an agent playing Crafter, a 2D survival game played on a grid.

    Each turn, you see a top-down map and must choose exactly ONE action that
    helps you progress toward the goal.

    MOVEMENT AND INTERACTION RULES:
    - You occupy one tile and face one of four directions: north, south, east,
      or west.
    - Movement actions move you one tile in the selected direction.
    - You interact with the tile directly in front of you.
    - To interact with an object, you must stand on an adjacent tile, face the
      object, and use the action 'do'.
    - Do not repeatedly move into blocked tiles.
    - Plan routes using the coordinates shown on the map.
    - Row y increases downward.
    - Column x increases rightward.

    TILE AND ENTITY RULES:
    - Grass: Safe, walkable ground.
    - Path: Safe, walkable ground.
    - Sand: Safe, walkable ground.
    - Water: Not walkable. You cannot enter or cross water and must go around it.
    - Lava: Deadly and not safely walkable. Entering lava kills the player.
      Never move onto lava.
    - Tree: Blocks movement. Stand next to it, face it, and use 'do' to collect
      wood.
    - Stone: Blocks movement. It can only be mined when the required tool is
      available.
    - Coal: Blocks movement. It can be mined with the appropriate tool.
    - Iron: Blocks movement. It can be mined with the appropriate tool.
    - Diamond: Blocks movement. It can be mined with the appropriate tool.
    - Table: Blocks movement and is used for crafting when standing next to it
      and facing it.
    - Furnace: Blocks movement and is used for smelting when standing next to it
      and facing it.
    - Cow: A living entity. It may move and can block the tile it occupies.
      Avoid it when it obstructs the route unless interacting with it is required.
    - Zombie: Hostile and dangerous. Avoid it or fight it when necessary.
    - Skeleton: Hostile and dangerous. Avoid it or fight it when necessary.
    - Player: Your current position on the map.

    GOAL-SPECIFIC GUIDANCE:
    - To collect wood, navigate to a walkable tile adjacent to a tree.
    - Face the tree.
    - Use 'do'.
    - Do not try to walk onto the tree tile.
    - Do not try to walk through water.
    - Reaching the tree is not enough; you must interact with it using 'do'.

    RESPONSE FORMAT:
    Reply with one short line of reasoning, then a final line in exactly this
    format:

    ACTION: <action_name>

    The action name must be copied exactly from the AVAILABLE ACTIONS list.
    Do not provide multiple actions.

  user: |
    GOAL: {objective}

    MAP (top-down; row = y increases downward, column = x increases rightward):
    {map}

    LEGEND:
    {legend}

    IMPORTANT MAP RULES:
    - Grass, path, and sand are walkable.
    - Water cannot be entered or crossed.
    - Lava kills the player and must never be entered.
    - Trees, rocks, resources, tables, furnaces, and entities block movement.
    - To interact with something, stand next to it, face it, and use 'do'.
    - To collect wood, face an adjacent tree and use 'do'.

    YOUR POSITION: {position}
    FACING: {facing}

    INVENTORY:
    {inventory}

    ACHIEVEMENTS UNLOCKED:
    {achievements}

    AVAILABLE ACTIONS:
    {actions}

    Decide your single next action. End your reply with:
    ACTION: <action_name>

actions:
  strategy: keyword
  fallback: noop

models:
  - name: microsoft/phi-4
    backend: huggingface-api
    max_tokens: 256
    temperature: 0.7
    dtype: auto
    device: auto

  - name: o3-2025-04-16
    backend: openai
    temperature: 0.7
    request_delay: 5.0
    dtype: auto
    device: auto

  - name: deepseek-ai/DeepSeek-R1
    backend: huggingface-api
    max_tokens: 256
    temperature: 0.7
    dtype: auto
    device: auto

  - name: heuristic-baseline
    backend: mock
    policy: heuristic
    fixed_action: noop
