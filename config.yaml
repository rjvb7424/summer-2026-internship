# Basic 5x5 world: one tree just above centre, player just below. Nothing else.
experiment:
  name: basic_5x5
  output_dir: runs
  num_trials: 10
  max_turns: 100
  seed: 0
  same_world_each_trial: true
  record_video: true
  video_fps: 4

objective:
  type: achievement
  target: collect_wood
  item: wood
  amount: 1

world:
  size: [5, 5] # 5x5 grid; coords 0..4, centre is (2,2)
  base_terrain: grass
  player_start: [2, 3] # just below centre
  static: true
  freeze_daylight: true
  inventory: {}
  features:
    trees:
      positions: [[2, 1]] # just above centre
      count: 0
  entities: {} # no cow, no anything

prompt:
  include_legend: true
  include_inventory: true
  include_achievements: true
  include_action_list: true
  system: |
    You are an agent playing Crafter, a 2D survival game played on a grid.
    Each turn you see a top-down map and must choose ONE action to progress
    toward the goal. You act on the tile directly in front of you (the tile in
    your FACING direction), so to interact with something you must be adjacent
    to it and facing it, then use the 'do' action.
    Reply with one short line of reasoning, then a final line in exactly this
    format:
    ACTION: <action_name>
  user: |
    GOAL: {objective}

    MAP (top-down; row = y increases downward, column = x increases rightward):
    {map}

    LEGEND:
    {legend}

    YOUR POSITION: {position}   FACING: {facing}

    INVENTORY:
    {inventory}

    ACHIEVEMENTS UNLOCKED: {achievements}

    AVAILABLE ACTIONS:
    {actions}

    Decide your single next action. End your reply with:
    ACTION: <action_name>

actions:
  strategy: keyword
  fallback: noop

models:
  - name: microsoft/phi-4
    backend: huggingface
    max_new_tokens: 256
    temperature: 0.7
    dtype: auto
    device: auto

  - name: o3-2025-04-16
    backend: openai
    max_new_tokens: 256
    temperature: 0.7
    dtype: auto
    device: auto

  - name: heuristic-baseline
    backend: mock
    policy: heuristic
    fixed_action: noop
