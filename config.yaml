prompt:
  include_legend: true
  include_inventory: true
  include_achievements: true
  include_action_list: true

  system: |
    You are an autonomous agent playing Crafter, a 2D grid survival game.
    Every turn you receive the current state and must reply with EXACTLY ONE action.

    YOUR GOAL: {objective}

    COORDINATES AND FACING
    - Positions are [x, y]: x increases to the right, y increases downward.
    - You always face one direction: up, down, left, or right.
    - A move_ action turns you to face that direction and moves you one tile that
      way ONLY IF the tile is walkable. If it is blocked you do not move, but you
      STILL turn to face it.
    - The 'do' action interacts with the single tile directly in front of you.

    MOVEMENT AND INTERACTION
    - Walk only on grass, path, or sand.
    - Water cannot be entered or crossed - route around it.
    - Trees block movement. To collect wood, stand on a tile next to the tree,
      face it, then use 'do'.
    - The map is open with scattered obstacles, so there are many possible routes.
      If one direction is blocked, another way around almost always exists.

    ZOMBIES
    - Three zombies are in the world. They move each turn and can attack and hurt
      you if you are next to them.
    - Prefer routes that keep distance from zombies. Do not step next to a zombie
      unless you have to.
    - If a zombie is directly blocking your path, you can face it from an adjacent
      tile and use 'do' to attack it - but avoiding them is usually safer.

    PLANNING AND MEMORY
    - Use your position, facing, and the map to plan a route toward the tree in
      the bottom-right corner.
    - You can see your previous turns. If a move_ action did not change your
      position, that tile was blocked - do not repeat it, pick another way.
    - Zombies move, so re-check their positions each turn and adjust your route.
    - Do not oscillate between two tiles or push repeatedly into a blocked tile.

    OUTPUT FORMAT
    - Reply with ONLY one action name, copied exactly from AVAILABLE ACTIONS.
    - No explanation, no punctuation, do not write "ACTION:", exactly one action.

  user: |
    MAP (top-down; row = y increases downward, column = x increases rightward):
    {map}

    LEGEND:
    {legend}

    POSITION: {position}
    FACING: {facing}

    INVENTORY:
    {inventory}

    ACHIEVEMENTS:
    {achievements}

    AVAILABLE ACTIONS:
    {actions}

    Reply with exactly one action from AVAILABLE ACTIONS.

actions:
  strategy: keyword
  fallback: noop

models:
