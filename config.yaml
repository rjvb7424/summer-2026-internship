experiment:
  name: craft_stone_pickaxe_resource_planning
  output_dir: runs
  num_trials: 5
  max_turns: 100
  seed: 0
  same_world_each_trial: true
  record_video: true
  video_fps: 6

objective:
  type: achievement
  target: make_stone_pickaxe
  item: stone_pickaxe
  amount: 1

world:
  size: [11, 7]
  base_terrain: grass
  player_start: [5, 3]
  static: true
  freeze_daylight: true
  inventory: {}

  features:
    trees:
      positions:
        # Tree patch on the right.
        - [8, 2]
        - [9, 2]
        - [10, 2]
        - [8, 3]
        - [9, 3]
        - [10, 3]
        - [8, 4]
        - [9, 4]
        - [10, 4]

    stone:
      positions:
        # Stone patch on the left.
        - [0, 2]
        - [1, 2]
        - [2, 2]
        - [0, 3]
        - [1, 3]
        - [2, 3]
        - [0, 4]
        - [1, 4]
        - [2, 4]

prompt:
  include_legend: true
  include_inventory: true
  include_achievements: true
  include_action_list: true

  system: |
    You are playing Crafter in a grid-based world.

    Choose one action each turn that helps complete the objective.

    Your position is shown as [x, y]:
    - x increases to the right.
    - y increases downward.

    You have a facing direction. Some actions move you, while others interact
    with the tile in front of you or craft an item.

    Respond with only one action name copied exactly from the available actions.

    Do not explain.
    Do not add punctuation.
    Do not write "ACTION:".
    Do not provide more than one action.

  user: |
    OBJECTIVE:
    {objective}

    MAP:
    {map}

    LEGEND:
    {legend}

    POSITION: {position}
    FACING: {facing}

    INVENTORY:
    {inventory}

    ACHIEVEMENTS:
    {achievements}

    AVAILABLE ACTIONS:
    {actions}

    Respond with only the single action you choose.

actions:
  strategy: keyword
  fallback: noop

models:
  - name: microsoft/phi-4
    backend: huggingface-api
    max_tokens: 128
    temperature: 0.2
    force_action: true
    action_retries: 1

  - name: gpt-5.4-2026-03-05
    backend: openai
    max_tokens: 1024
    temperature: 0.2
    reasoning_effort: minimal
    force_action: true
    action_retries: 1

  - name: deepseek-ai/DeepSeek-R1-0528
    backend: huggingface-api
    max_tokens: 4096
    temperature: 0.2
    force_action: true
    action_retries: 1

  - name: o3-2025-04-16
    backend: openai
    max_tokens: 1024
    temperature: 0.2
    reasoning_effort: minimal
    force_action: true
    action_retries: 1

  - name: heuristic-baseline
    backend: mock
    policy: heuristic
    fixed_action: noop
